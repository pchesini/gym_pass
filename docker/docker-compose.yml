version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gym_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymdb}
      POSTGRES_USER: ${POSTGRES_USER:-gymuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gympass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - gym-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: gym_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gym.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "8081:80"
    depends_on:
      - postgres
    networks:
      - gym-net

volumes:
  postgres_data:

networks:
  gym-net:
    driver: bridge
