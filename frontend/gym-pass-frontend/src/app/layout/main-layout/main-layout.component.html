<mat-sidenav-container class="layout-shell">
  <mat-sidenav
    #sidenav
    class="app-sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <div class="brand-block">
      <span class="brand-title">Inferno Gym</span>
      <span class="brand-subtitle">Operacion diaria</span>
    </div>

    <mat-nav-list>
      @for (item of navigationItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeSidenavOnMobile()"
        >
          {{ item.label }}
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <button mat-button type="button" class="menu-button" (click)="toggleSidenav()">
        Menu
      </button>

      <div class="toolbar-copy">
        <span class="toolbar-title">Inferno Gym</span>
        <span class="toolbar-subtitle">Operacion diaria y control administrativo</span>
      </div>

      <div class="toolbar-spacer" aria-hidden="true"></div>
    </mat-toolbar>

    <main class="content-wrapper">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
